<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>b.ZONE pc - Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Новая цветовая схема по макету */
            --bg-primary: #1a1a1a; /* Темный фон */
            --bg-secondary: #2c2c2c; /* Фон карточек/элементов/шапки */
            --bg-tertiary: #3a3a3a; /* Фон неактивных табов/кнопок */
            --text-primary: #ffffff; /* Основной белый текст */
            --text-secondary: #aaaaaa; /* Вторичный серый текст */
            --accent-primary: #FFFF00; /* Желтый акцент */
            --border-color: #444444;
            --shadow-color: rgba(0, 0, 0, 0.3);
            /* Интеграция с темой ТГ */
            --tg-theme-bg-color: var(--bg-primary);
            --tg-theme-text-color: var(--text-primary);
            --tg-theme-hint-color: var(--text-secondary);
            --tg-theme-link-color: var(--accent-primary);
            --tg-theme-button-color: var(--accent-primary);
            --tg-theme-button-text-color: #000000; /* Черный текст на желтой кнопке */
            --tg-theme-secondary-bg-color: var(--bg-secondary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Укажите нужный шрифт, если известен, или оставьте системный */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            -webkit-tap-highlight-color: transparent; /* Убрать синюю подсветку при тапе */
        }
        html {
            background-color: var(--bg-primary); /* Фон для всей страницы */
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 0;
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            overscroll-behavior: none;
            padding-top: 71px; /* Отступ для фиксированной шапки */
        }
        .container {
             max-width: 100%; /* Полная ширина в WebApp */
             margin: 0 auto;
             padding: 0 15px 90px 15px; /* Увеличен отступ снизу для корзины */
        }

        /* --- Новая шапка --- */
        .app-header {
            display: flex;
            justify-content: space-around; /* Равномерное распределение */
            align-items: center;
            background-color: var(--bg-secondary); /* Фон шапки */
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            position: fixed; /* Фиксируем шапку сверху */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100; /* Над контентом */
        }
        .header-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 10px; /* Маленький шрифт под иконкой */
            font-weight: 500;
            transition: color 0.2s ease;
            padding: 5px;
            border-radius: 8px;
            flex-basis: 25%; /* Равная ширина для 4х элементов */
            text-align: center;
        }
         .header-item:hover {
             color: var(--text-primary);
         }
        .header-item.active {
            color: var(--accent-primary); /* Активный пункт желтый */
            font-weight: 600;
        }
        .header-icon {
            width: 24px; /* Размер иконок из SVG */
            height: 24px;
            margin-bottom: 4px;
        }
         .header-icon svg {
             display: block;
             width: 100%;
             height: 100%;
             fill: currentColor; /* Цвет иконки наследуется от .header-item */
         }
         /* У активного элемента иконка тоже должна быть желтой */
         .header-item.active .header-icon svg path {
            fill: var(--accent-primary);
         }

        /* --- Основные категории (ПК / Девайсы) --- */
        .main-categories {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center; /* Центрируем табы */
        }
        .main-category-tab {
            padding: 10px 25px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
         /* Стрелка */
         .main-category-tab svg {
             width: 14px;
             height: 14px;
             fill: none; /* Убираем заливку */
             stroke: currentColor; /* Цвет линии */
             stroke-width: 2;
             transition: transform 0.2s ease;
         }
        .main-category-tab.active {
            background-color: var(--bg-secondary); /* Фон активного таба как у карточек */
            color: var(--text-primary); /* Текст активного таба */
            border: 1px solid var(--border-color);
        }
         .main-category-tab.active svg {
             transform: rotate(90deg); /* Поворот стрелки у активного таба */
         }

        /* --- Подкатегории (Мыши, Клавиатуры...) --- */
        .sub-categories {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 5px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
        }
         .sub-categories::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        .sub-category-item {
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s ease, color 0.2s ease;
            border: 1px solid transparent;
        }
        .sub-category-item:hover {
            background-color: #4a4a4a;
            color: var(--text-primary);
        }
        .sub-category-item.active {
            background-color: var(--accent-primary);
            color: #000000; /* Черный текст на желтом */
            font-weight: 600;
            border-color: var(--accent-primary);
        }

        /* --- Заголовок секции (НАШИ ЛУЧШИЕ ПРЕДЛОЖЕНИЯ) --- */
        .section-title {
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 700; /* Пожирнее */
            color: var(--text-primary);
        }

         /* --- Стили для Сетки Товаров (Адаптация под новый дизайн) --- */
         .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            gap: 15px;
            padding-bottom: 80px; /* Отступ снизу для корзины */
         }
         .product-card {
             background-color: var(--bg-secondary);
             border-radius: 15px; /* Более скругленные углы */
             overflow: hidden;
             position: relative;
             box-shadow: 0 5px 15px var(--shadow-color);
             transition: transform 0.2s ease, box-shadow 0.2s ease;
             cursor: pointer;
             display: flex;
             flex-direction: column;
             border: 1px solid var(--border-color);
         }
         .product-card:hover {
             transform: translateY(-5px);
             box-shadow: 0 8px 20px var(--shadow-color);
         }
         .product-image-wrapper { /* Обертка для картинки */
             position: relative;
             width: 100%;
             aspect-ratio: 1 / 1; /* Квадратные */
             background-color: var(--bg-tertiary);
             overflow: hidden; /* Чтобы тег не вылезал за рамки */
         }
         .product-tag { /* Стиль для тегов типа "2K", "FULL HD" */
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            z-index: 1;
         }
         .product-image { /* Сама картинка */
             width: 100%;
             height: 100%;
             object-fit: cover; /* Или contain */
             display: block;
             background-color: var(--bg-tertiary); /* Фон на случай ошибки загрузки */
         }
         .product-content {
             padding: 12px;
             flex-grow: 1;
             display: flex;
             flex-direction: column;
             justify-content: space-between; /* Чтобы кнопка прижалась к низу */
             min-height: 160px; /* Примерная мин. высота контентной части */
         }
         .product-name {
             font-size: 15px;
             font-weight: 600;
             color: var(--text-primary);
             margin-bottom: 4px;
             /* Ограничение по строкам */
             display: -webkit-box;
             -webkit-line-clamp: 2;
             -webkit-box-orient: vertical;
             overflow: hidden;
             text-overflow: ellipsis;
             min-height: calc(1.5em * 2);
         }
         .product-specs {
             font-size: 12px;
             color: var(--text-secondary);
             margin-bottom: 10px;
             /* Ограничение по строкам */
             display: -webkit-box;
             -webkit-line-clamp: 2; /* Меньше строк для спеков в карточке */
             -webkit-box-orient: vertical;
             overflow: hidden;
             text-overflow: ellipsis;
             min-height: calc(1.5em * 2);
         }
         .product-price-container {
            display: flex;
            align-items: baseline; /* Выравнивание цен */
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap; /* Перенос на маленьких экранах */
         }
         .product-current-price {
             font-size: 18px;
             font-weight: 700;
             color: var(--text-primary); /* Белая текущая цена */
         }
         .product-original-price {
             font-size: 13px;
             color: var(--text-secondary);
             text-decoration: line-through; /* Зачеркнутая старая цена */
         }
         .product-add-button {
             display: block;
             background-color: var(--accent-primary); /* Желтая кнопка */
             color: #000000; /* Черный текст */
             text-align: center;
             padding: 10px 15px;
             border-radius: 10px; /* Скругление кнопки */
             border: none;
             width: 100%;
             cursor: pointer;
             font-weight: 700; /* Жирный текст */
             font-size: 14px;
             transition: background-color 0.2s ease, transform 0.1s ease, filter 0.2s ease;
             margin-top: auto; /* Прижимаем кнопку к низу, если контента мало */
         }
         .product-add-button:hover {
             filter: brightness(0.9); /* Легкое затемнение при ховере */
         }
          .product-add-button:active {
              transform: scale(0.97);
              filter: brightness(0.85);
          }

         /* --- Стили Корзины (адаптация) --- */
        .cart-summary {
            background-color: var(--bg-secondary); /* Фон под дизайн */
            padding: 15px;
            border-radius: 12px 12px 0 0; /* Скругляем только верхние углы */
            position: fixed; /* Фиксируем внизу */
            bottom: 0; /* Прижимаем к низу */
            left: 0; /* От края до края */
            right: 0;
            width: 100%; /* На всю ширину */
            box-shadow: 0 -5px 20px var(--shadow-color);
            z-index: 150; /* Выше шапки */
            display: none; /* Изначально скрыта */
            flex-direction: column; /* Элементы друг под другом */
            gap: 10px;
            max-height: 50vh; /* Ограничиваем высоту */
            overflow-y: auto; /* Добавляем скролл при необходимости */
            border-top: 1px solid var(--border-color);
        }
         .cart-info {
             display: flex;
             justify-content: space-between;
             align-items: center;
             font-size: 16px;
             font-weight: 600;
             padding: 0 5px; /* Небольшие отступы по бокам */
         }
         .cart-total {
            color: var(--accent-primary); /* Сумма желтым */
         }
        .checkout-button {
            display: block;
            width: calc(100% - 10px); /* Чуть меньше полной ширины */
            margin: 5px 5px 0 5px; /* Отступы */
            padding: 12px 20px;
            background-color: var(--tg-theme-button-color); /* Используем переменную ТГ */
            color: var(--tg-theme-button-text-color); /* Используем переменную ТГ */
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease, filter 0.2s ease;
        }
         .checkout-button:disabled {
             opacity: 0.6;
             cursor: not-allowed;
         }
        .checkout-button:not(:disabled):hover {
            filter: brightness(0.9);
        }
         .checkout-button:not(:disabled):active {
             transform: scale(0.98);
             filter: brightness(0.85);
         }

         /* --- Стили Модального Окна --- */
        .modal {
          display: none;
          position: fixed;
          z-index: 200; /* Выше корзины */
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          overflow: auto;
          background-color: rgba(0,0,0,0.7);
          -webkit-backdrop-filter: blur(4px);
          backdrop-filter: blur(4px);
          padding: 20px; /* Отступы для маленьких экранов */
          align-items: center; /* Вертикальное центрирование */
          justify-content: center; /* Горизонтальное центрирование */
        }
        .modal.show { /* Класс для показа */
             display: flex;
        }
        .modal-content {
          background-color: var(--bg-secondary);
          margin: auto;
          padding: 20px;
          border-radius: 15px;
          max-width: 500px;
          width: 95%;
          position: relative;
          color: var(--text-primary);
          border: 1px solid var(--border-color);
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
          max-height: 90vh; /* Ограничение высоты */
          overflow-y: auto; /* Скролл для контента */
        }
        .modal-close-button {
          color: var(--text-secondary);
          position: absolute;
          top: 10px;
          right: 15px;
          font-size: 28px;
          line-height: 1;
          font-weight: bold;
          cursor: pointer;
          transition: color 0.2s ease, transform 0.2s ease;
          padding: 5px;
        }
        .modal-close-button:hover {
          color: var(--text-primary);
          transform: rotate(90deg);
        }
        /* Стили для контента модалки (названия, описание и т.д.) */
        #modalProductImage {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 10px;
            background-color: var(--bg-tertiary);
            display: block;
        }
        #modalProductName {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        #modalProductSpecs, #modalProductDescription {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        #modalProductPrice {
             font-size: 20px;
             font-weight: 700;
             color: var(--text-primary); /* Белая цена */
             margin-bottom: 20px;
        }
        #modalProductOriginalPrice {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: line-through;
            margin-left: 10px;
        }
        #modalAddToCartButton {
             /* Стили как у product-add-button */
             display: block;
             background-color: var(--accent-primary);
             color: #000000;
             text-align: center;
             padding: 12px 15px; /* Увеличим паддинг */
             border-radius: 10px;
             border: none;
             width: 100%;
             cursor: pointer;
             font-weight: 700;
             font-size: 16px; /* Крупнее */
             transition: background-color 0.2s ease, transform 0.1s ease, filter 0.2s ease;
        }
         #modalAddToCartButton:hover {
             filter: brightness(0.9);
         }
         #modalAddToCartButton:active {
              transform: scale(0.97);
              filter: brightness(0.85);
         }
        /* Преимущества в модалке */
        .modal-advantages {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        .modal-advantages h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .advantages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); /* Адаптивные колонки */
            gap: 15px;
            text-align: center;
        }
        .advantage-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .advantage-icon {
            width: 35px;
            height: 35px;
        }
        .advantage-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-primary); /* Желтые иконки преимуществ */
        }
        .advantage-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Стили для спиннера загрузки */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px; /* Чтобы лоадер был виден */
            width: 100%;
            grid-column: 1 / -1; /* Занимает все колонки грида */
        }
        .loader {
          border: 4px solid var(--bg-tertiary);
          border-top: 4px solid var(--accent-primary);
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .error-message {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--danger-color);
            padding: 20px;
        }
        .empty-message {
             grid-column: 1 / -1;
             text-align: center;
             color: var(--text-secondary);
             padding: 20px;
        }
        /* Скрытие элементов */
        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>
    <!-- Новая шапка -->
    <div class="app-header">
        <div class="header-item active" id="nav-catalog"> <!-- Делаем каталог активным по умолчанию -->
            <div class="header-icon">
                <!-- SVG Каталог -->
                <svg viewBox="0 0 24 24"><path d="M8.49975 10.7505H2.25C1.0095 10.7505 0 9.741 0 8.5005V2.25C0 1.0095 1.0095 0 2.25 0H8.49975C9.74025 0 10.7498 1.0095 10.7498 2.25V8.5005C10.7498 9.741 9.741 10.7505 8.49975 10.7505ZM21.75 10.7505H15.4995C14.259 10.7505 13.2495 9.741 13.2495 8.5005V2.25C13.2495 1.0095 14.259 0 15.4995 0H21.75C22.9905 0 24 1.0095 24 2.25V8.5005C24 9.741 22.9905 10.7505 21.75 10.7505ZM8.49975 23.9535H2.25C1.0095 23.9535 0 22.944 0 21.7035V15.453C0 14.2125 1.0095 13.203 2.25 13.203H8.49975C9.74025 13.203 10.7498 14.2125 10.7498 15.453V21.7035C10.7498 22.944 9.741 23.9535 8.49975 23.9535ZM21.75 23.9535H15.4995C14.259 23.9535 13.2495 22.944 13.2495 21.7035V15.453C13.2495 14.2125 14.259 13.203 15.4995 13.203H21.75C22.9905 13.203 24 14.2125 24 15.453V21.7035C24 22.944 22.9905 23.9535 21.75 23.9535Z"/></svg>
            </div>
            <span>Каталог</span>
        </div>
        <div class="header-item" id="nav-orders">
            <div class="header-icon">
                 <!-- SVG Заказы -->

    <!-- Контейнер для Корзины (фиксированный) -->

            <span id="cartCount">Товаров: 0</span>
            <span id="cartTotal" class="cart-total">0 ₽</span>

    <!-- Модальное окно для деталей продукта -->

        <div class="modal-content">
            <span class="modal-close-button" id="closeModalButton">&times;</span>

                 <div class="advantages-grid" id="advantagesGrid">
                     <!-- Сюда JS добавит иконки преимуществ -->
                     <!-- Пример:
                     <div class="advantage-item">
                         <div class="advantage-icon"> SVG </div>
                         <span class="advantage-text">Бесплатная сборка</span>
                     </div>
                     -->
                 </div>
             </div>

                 <span id="modalProductPrice">0 ₽</span>
                 <span id="modalProductOriginalPrice" class="hidden">0 ₽</span>
            </div>
            <button id="modalAddToCartButton">В корзину</button>
        </div>
    </div>


    <script>
        // --- Инициализация Telegram WebApp ---
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation(); // Запрос подтверждения при закрытии, если нужно

        // --- Настройка цветов интерфейса Telegram под нашу тему ---
        function applyThemeColors() {
            try {
                const rootStyles = getComputedStyle(document.documentElement);
                const headerColor = rootStyles.getPropertyValue('--bg-secondary').trim(); // Шапка ТГ как фон элементов
                const bgColor = rootStyles.getPropertyValue('--bg-primary').trim(); // Фон ТГ как основной фон
                tg.setHeaderColor(headerColor || '#2c2c2c');
                tg.setBackgroundColor(bgColor || '#1a1a1a');
                console.log("TG Theme colors applied:", { headerColor, bgColor });
            } catch(e) {
                 console.error("Error applying TG theme colors:", e);
            }
        }
        applyThemeColors();
        tg.onEvent('themeChanged', applyThemeColors); // Слушаем изменения темы

        // --- Глобальные переменные ---
        let allCategories = []; // [{ id, name, type ('pc'/'device') }]
        let allProducts = [];   // [{ id, categoryId, name, price, specs, description, image, originalPrice?, tag?, advantages? }]
        let cart = {};          // { productId: { productId, name, price, quantity } }
        let currentMainCategoryType = 'pc'; // 'pc' или 'devices'
        let currentSubCategoryId = null;    // ID активной подкатегории (для 'devices')
        const PC_CATEGORY_NAME = "ИГРОВЫЕ ПК"; // Имя основной категории ПК (для фильтрации)

        // --- Элементы DOM ---
        const productsGrid = document.getElementById('productsGrid');
        const cartSummary = document.getElementById('cartSummary');
        const cartCount = document.getElementById('cartCount');
        const cartTotal = document.getElementById('cartTotal');
        const checkoutButton = document.getElementById('checkoutButton'); // Кнопка внизу
        const mainCategoryTabs = document.querySelectorAll('.main-category-tab');
        const subCategoriesContainer = document.getElementById('subCategoriesContainer');
        const sectionTitle = document.getElementById('sectionTitle');
        const modal = document.getElementById('productModal');
        const closeModalButton = document.getElementById('closeModalButton');
        // Элементы модального окна
        const modalImage = document.getElementById('modalProductImage');
        const modalName = document.getElementById('modalProductName');
        const modalSpecs = document.getElementById('modalProductSpecs');
        const modalDescription = document.getElementById('modalProductDescription');
        const modalPrice = document.getElementById('modalProductPrice');
        const modalOriginalPrice = document.getElementById('modalProductOriginalPrice');
        const modalAddToCartButton = document.getElementById('modalAddToCartButton');
        const modalAdvantagesContainer = document.getElementById('modalAdvantagesContainer');
        const advantagesGrid = document.getElementById('advantagesGrid');

        // --- Функции ---

        // Форматирование цены
        function formatPrice(price) {
            // Проверка, что price - число
            const numPrice = Number(price);
            if (isNaN(numPrice)) {
                console.warn("Invalid price for formatting:", price);
                return '0 ₽';
            }
            return numPrice.toLocaleString('ru-RU') + ' ₽';
        }

        // Показ/скрытие лоадера в сетке
        function showLoader(show = true) {
            if (show) {
                productsGrid.innerHTML = `
                    <div class="loader-container">
                        <div class="loader"></div>
                    </div>`;
            } else {
                const loaderContainer = productsGrid.querySelector('.loader-container');
                if (loaderContainer) {
                    loaderContainer.remove();
                }
            }
        }

        // Показ сообщения об ошибке в сетке
        function showErrorMessage(message) {
            productsGrid.innerHTML = `<p class="error-message">${message}</p>`;
        }
        // Показ сообщения об отсутствии товаров
        function showEmptyMessage(message = "Товары отсутствуют") {
             productsGrid.innerHTML = `<p class="empty-message">${message}</p>`;
        }

        // Отображение товаров
        function displayProducts(products) {
            showLoader(false);
            productsGrid.innerHTML = ''; // Очищаем сетку перед рендерингом

            if (!products || products.length === 0) {
                showEmptyMessage(currentMainCategoryType === 'pc' ? "Игровые ПК не найдены" : "Девайсы в этой категории отсутствуют");
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.dataset.productId = product.id;

                const imageSrc = product.image || 'images/placeholder.png';
                const tagHtml = product.tag ? `<div class="product-tag">${product.tag}</div>` : '';
                const originalPriceHtml = product.originalPrice && product.originalPrice > product.price
                    ? `<span class="product-original-price">${formatPrice(product.originalPrice)}</span>`
                    : '';

                card.innerHTML = `
                    <div class="product-image-wrapper">
                        ${tagHtml}
                        <img src="${imageSrc}" alt="${product.name}" class="product-image" onerror="this.onerror=null; this.src='images/placeholder.png';">
                    </div>
                    <div class="product-content">
                        <div>
                             <div class="product-name">${product.name || 'Без названия'}</div>
                            <div class="product-specs">${product.specs || ''}</div>
                        </div>
                        <div>
                             <div class="product-price-container">
                                 <span class="product-current-price">${formatPrice(product.price)}</span>
                                 ${originalPriceHtml}
                             </div>
                             <button class="product-add-button" data-product-id="${product.id}">В корзину</button>
                         </div>
                    </div>
                `;
                // Обработчик клика на карточку (открытие модалки)
                card.addEventListener('click', (e) => {
                    // Открываем модалку только если клик не по кнопке
                    if (!e.target.classList.contains('product-add-button')) {
                         openProductModal(product.id);
                    }
                });
                // Обработчик клика на кнопку "В корзину"
                card.querySelector('.product-add-button').addEventListener('click', (e) => {
                    e.stopPropagation(); // Предотвращаем открытие модалки
                    addToCart(product.id);
                });

                productsGrid.appendChild(card);
            });
        }

        // Отображение подкатегорий
        function displaySubCategories(categories) {
            subCategoriesContainer.innerHTML = ''; // Очищаем
            if (categories && categories.length > 0) {
                 // Кнопка "Все девайсы"
                const allButton = document.createElement('div');
                allButton.className = 'sub-category-item' + (currentSubCategoryId === null ? ' active' : '');
                allButton.textContent = 'Все девайсы';
                allButton.dataset.categoryId = 'all';
                allButton.addEventListener('click', () => handleSubCategoryClick(null, allButton));
                subCategoriesContainer.appendChild(allButton);

                // Остальные подкатегории
                categories.forEach(cat => {
                     const button = document.createElement('div');
                     button.className = 'sub-category-item' + (currentSubCategoryId === cat.id ? ' active' : '');
                     button.textContent = cat.name;
                     button.dataset.categoryId = cat.id;
                     button.addEventListener('click', () => handleSubCategoryClick(cat.id, button));
                     subCategoriesContainer.appendChild(button);
                });
                subCategoriesContainer.classList.remove('hidden'); // Показываем блок
            } else {
                 subCategoriesContainer.classList.add('hidden'); // Скрываем, если нет подкатегорий
            }
        }

        // Клик на подкатегорию
        function handleSubCategoryClick(categoryId, clickedButton) {
            // Если кликнули на уже активную категорию, ничего не делаем
            if (currentSubCategoryId === categoryId) return;

            currentSubCategoryId = categoryId;

            // Обновляем активный класс для кнопок
            document.querySelectorAll('#subCategoriesContainer .sub-category-item').forEach(btn => {
                 btn.classList.remove('active');
            });
            if (clickedButton) {
                clickedButton.classList.add('active');
            } else { // Если categoryId === null (клик на "Все")
                 const allButton = document.querySelector('#subCategoriesContainer .sub-category-item[data-category-id="all"]');
                 if (allButton) allButton.classList.add('active');
            }

            // Фильтруем и отображаем продукты
            filterAndDisplayProducts();
        }

        // Фильтрация и отображение продуктов
        function filterAndDisplayProducts() {
            showLoader(true); // Показываем лоадер на время фильтрации
            let productsToDisplay = [];
            const deviceCategories = allCategories.filter(cat => cat.type === 'device'); // Определяем категории девайсов

            if (currentMainCategoryType === 'pc') {
                 // Ищем ПК категорию
                const pcCategory = allCategories.find(cat => cat.type === 'pc' || cat.name === PC_CATEGORY_NAME);
                if (pcCategory) {
                    productsToDisplay = allProducts.filter(p => p.categoryId === pcCategory.id);
                } else {
                     console.warn(`Категория для ПК ('${PC_CATEGORY_NAME}' или type 'pc') не найдена!`);
                     // Можно показать все товары как запасной вариант, или только те, что не девайсы
                     const deviceCategoryIds = deviceCategories.map(cat => cat.id);
                     productsToDisplay = allProducts.filter(p => !deviceCategoryIds.includes(p.categoryId));
                }
                 // Показываем заголовок "Лучшие предложения" для ПК
                 sectionTitle.classList.remove('hidden');
                 subCategoriesContainer.classList.add('hidden'); // Скрываем подкатегории
            } else if (currentMainCategoryType === 'devices') {
                displaySubCategories(deviceCategories); // Показываем подкатегории

                if (currentSubCategoryId === null) { // Показываем все девайсы
                    const deviceCategoryIds = deviceCategories.map(cat => cat.id);
                    productsToDisplay = allProducts.filter(p => deviceCategoryIds.includes(p.categoryId));
                } else { // Показываем товары выбранной подкатегории
                    productsToDisplay = allProducts.filter(p => p.categoryId === currentSubCategoryId);
                }
                sectionTitle.classList.add('hidden'); // Скрываем заголовок для девайсов
            }

            // Небольшая задержка для имитации загрузки и предотвращения мерцания
            setTimeout(() => {
                 displayProducts(productsToDisplay);
            }, 100); // 100ms задержка
        }

        // Загрузка данных (категории и продукты)
        async function fetchData() {
            showLoader(true);
            try {
                // ЗАМЕНИТЕ URL НА ВАШИ РЕАЛЬНЫЕ API ENDPOINTS!
                const categoriesUrl = '/api/categories'; // Ваш URL для категорий
                const productsUrl = '/api/products';     // Ваш URL для продуктов

                const [categoriesResponse, productsResponse] = await Promise.all([
                    fetch(categoriesUrl).then(res => res.ok ? res.json() : Promise.reject(new Error(`Categories API Error: ${res.status}`))),
                    fetch(productsUrl).then(res => res.ok ? res.json() : Promise.reject(new Error(`Products API Error: ${res.status}`)))
                ]);

                // Добавляем тип категории для удобства (pc/device)
                allCategories = categoriesResponse.map(cat => ({
                    ...cat,
                    type: cat.name === PC_CATEGORY_NAME ? 'pc' : 'device' // Пример определения типа
                })) || [];
                allProducts = productsResponse || [];

                console.log("Categories loaded:", allCategories);
                console.log("Products loaded:", allProducts);

                // Первоначальное отображение (ПК по умолчанию)
                currentMainCategoryType = 'pc'; // Убедимся, что начинаем с ПК
                currentSubCategoryId = null;
                filterAndDisplayProducts();

            } catch (error) {
                console.error('Ошибка загрузки данных каталога:', error);
                showErrorMessage('Не удалось загрузить каталог. Попробуйте позже.');
                tg.showAlert('Не удалось загрузить каталог. Пожалуйста, попробуйте еще раз.');
            } finally {
                 // Лоадер скрывается внутри filterAndDisplayProducts
            }
        }

        // --- Логика Корзины ---
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            if (cart[productId]) {
                cart[productId].quantity++;
            } else {
                cart[productId] = {
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                };
            }
            updateCartSummary();
            saveCartToLocalStorage();
            tg.HapticFeedback.impactOccurred('light');
        }

        function removeFromCart(productId) {
             // Эта функция пока не используется в интерфейсе, но может понадобиться
            if (cart[productId]) {
                cart[productId].quantity--;
                if (cart[productId].quantity <= 0) {
                    delete cart[productId];
                }
                updateCartSummary();
                saveCartToLocalStorage();
                 tg.HapticFeedback.impactOccurred('light');
            }
        }

        function updateCartSummary() {
            const items = Object.values(cart);
            const totalQuantity = items.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = items.reduce((sum, item) => sum + item.price * item.quantity, 0);

            if (totalQuantity > 0) {
                cartCount.textContent = `Товаров: ${totalQuantity}`;
                cartTotal.textContent = formatPrice(totalPrice);
                checkoutButton.disabled = false;
                cartSummary.style.display = 'flex'; // Показываем корзину

                // Активируем главную кнопку Telegram
                tg.MainButton.setText(`Оформить (${formatPrice(totalPrice)})`);
                tg.MainButton.setParams({
                    text_color: tg.themeParams.button_text_color || '#000000', // Черный текст для желтой кнопки
                    color: tg.themeParams.button_color || '#FFFF00' // Желтый цвет кнопки
                });
                if (!tg.MainButton.isVisible) {
                    tg.MainButton.show();
                }
            } else {
                cartSummary.style.display = 'none'; // Скрываем корзину
                checkoutButton.disabled = true;
                if (tg.MainButton.isVisible) {
                    tg.MainButton.hide();
                }
            }
        }

        // Оформление заказа (вызывается кнопкой и MainButton)
        function handleCheckout() {
            const orderItems = Object.values(cart);
             if (orderItems.length === 0) {
                 tg.showAlert('Ваша корзина пуста.');
                 return;
             }

            const orderData = {
                cart: orderItems.map(item => ({
                    productId: item.productId,
                    price: item.price,
                    quantity: item.quantity
                })),
                total: orderItems.reduce((sum, item) => sum + item.price * item.quantity, 0)
                // Можно добавить ID пользователя, если нужно бэкенду
                // userId: tg.initDataUnsafe?.user?.id
            };

            console.log("Отправка данных заказа боту:", JSON.stringify(orderData));
            tg.sendData(JSON.stringify(orderData));
            // Не очищаем корзину и не закрываем окно здесь,
            // пусть бот пришлет подтверждение и команду закрыть, если нужно.
        }

         // --- Логика Модального окна ---
         function openProductModal(productId) {
             const product = allProducts.find(p => p.id === productId);
             if (!product) return;

             modalImage.src = product.image || 'images/placeholder.png';
             modalImage.onerror = () => { modalImage.src = 'images/placeholder.png'; }; // Заглушка при ошибке
             modalName.textContent = product.name;
             modalSpecs.textContent = product.specs || '';
             modalDescription.textContent = product.description || '';
             modalPrice.textContent = formatPrice(product.price);

             if (product.originalPrice && product.originalPrice > product.price) {
                 modalOriginalPrice.textContent = formatPrice(product.originalPrice);
                 modalOriginalPrice.classList.remove('hidden');
             } else {
                 modalOriginalPrice.classList.add('hidden');
             }

             // Отображение преимуществ (если есть)
            if (product.advantages && Array.isArray(product.advantages) && product.advantages.length > 0) {
                advantagesGrid.innerHTML = ''; // Очищаем предыдущие
                product.advantages.forEach(adv => {
                    const item = document.createElement('div');
                    item.className = 'advantage-item';
                    // Ожидаем, что adv = { icon_svg: "...", text: "..." }
                    item.innerHTML = `
                        <div class="advantage-icon">${adv.icon_svg || ''}</div>
                        <span class="advantage-text">${adv.text || ''}</span>
                    `;
                    // Важно: Убедитесь, что SVG в adv.icon_svg безопасен и не содержит вредоносного кода!
                    advantagesGrid.appendChild(item);
                });
                modalAdvantagesContainer.classList.remove('hidden');
            } else {
                modalAdvantagesContainer.classList.add('hidden');
            }


             // Обновляем обработчик кнопки добавления в корзину
             const newModalButton = modalAddToCartButton.cloneNode(true);
             newModalButton.textContent = "В корзину";
             modalAddToCartButton.parentNode.replaceChild(newModalButton, modalAddToCartButton); // Заменяем старую кнопку
             newModalButton.onclick = () => {
                 addToCart(product.id);
                 closeModal();
                 tg.HapticFeedback.impactOccurred('medium');
             };

             modal.classList.add('show'); // Показываем модальное окно
             tg.HapticFeedback.impactOccurred('light');
         }

         function closeModal() {
             modal.classList.remove('show');
         }

        // --- Инициализация и обработчики событий ---
        document.addEventListener('DOMContentLoaded', () => {
            // Загрузка данных
            fetchData();
            // Восстановление корзины
            loadCartFromLocalStorage();
            updateCartSummary(); // Обновить отображение корзины и кнопки

            // Обработчик кнопки оформления в веб-интерфейсе
            checkoutButton.addEventListener('click', handleCheckout);

            // Обработчики для табов основных категорий (ПК/Девайсы)
            mainCategoryTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const type = tab.dataset.categoryType;
                    // Не переключаться, если уже активно
                    if (type === currentMainCategoryType) return;

                    currentMainCategoryType = type;
                    currentSubCategoryId = null; // Сбрасываем подкатегорию

                    mainCategoryTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    filterAndDisplayProducts();
                });
            });

            // Обработчики для навигации в шапке
            document.getElementById('nav-catalog').addEventListener('click', () => {
                // Уже в каталоге, ничего не делаем или обновляем?
                console.log("Клик на Каталог");
                 // Можно добавить скролл вверх: window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            document.getElementById('nav-orders').addEventListener('click', () => {
                // Функционал заказов/связи/инфо не реализован в этом WebApp
                // Отправляем сообщение боту или показываем уведомление
                console.log("Клик на Заказы");
                tg.showAlert('Для просмотра заказов используйте команду /start в боте.');
            });
            document.getElementById('nav-contact').addEventListener('click', () => {
                console.log("Клик на Связь");
                 tg.showAlert('Для связи используйте команду /start в боте.');
            });
            document.getElementById('nav-info').addEventListener('click', () => {
                console.log("Клик на Инфо");
                 tg.showAlert('Для информации используйте команду /start в боте.');
            });

            // Закрытие модального окна
            closeModalButton.addEventListener('click', closeModal);
            modal.addEventListener('click', (event) => {
                // Закрываем по клику на фон (вне .modal-content)
                if (event.target === modal) {
                    closeModal();
                }
            });
        });

         // --- Сохранение/Загрузка корзины в localStorage ---
         function saveCartToLocalStorage() {
             try {
                 localStorage.setItem('tgWebAppCart', JSON.stringify(cart));
             } catch (e) {
                 console.warn("Не удалось сохранить корзину в localStorage:", e);
             }
         }

         function loadCartFromLocalStorage() {
             try {
                 const savedCart = localStorage.getItem('tgWebAppCart');
                 if (savedCart) {
                     cart = JSON.parse(savedCart);
                     console.log("Корзина восстановлена из localStorage:", cart);
                 }
             } catch (e) {
                 console.warn("Не удалось восстановить корзину из localStorage:", e);
                 cart = {}; // Сброс в случае ошибки
             }
         }

    </script>
</body>
</html>
