<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f353d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d21;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#grad1)"/>
  
  <!-- Клавиатура -->
  <rect x="100" y="150" width="300" height="100" rx="10" fill="#333" stroke="#444" stroke-width="2"/>
  <rect x="110" y="160" width="280" height="80" rx="5" fill="#222"/>
  <!-- Клавиши -->
  <g fill="#444">
    <rect x="120" y="170" width="20" height="20" rx="3"/>
    <rect x="150" y="170" width="20" height="20" rx="3"/>
    <rect x="180" y="170" width="20" height="20" rx="3"/>
    <rect x="210" y="170" width="20" height="20" rx="3"/>
    <rect x="240" y="170" width="20" height="20" rx="3"/>
    <rect x="270" y="170" width="20" height="20" rx="3"/>
    <rect x="300" y="170" width="20" height="20" rx="3"/>
    <rect x="330" y="170" width="20" height="20" rx="3"/>
    
    <rect x="120" y="200" width="20" height="20" rx="3"/>
    <rect x="150" y="200" width="20" height="20" rx="3"/>
    <rect x="180" y="200" width="20" height="20" rx="3"/>
    <rect x="210" y="200" width="20" height="20" rx="3"/>
    <rect x="240" y="200" width="20" height="20" rx="3"/>
    <rect x="270" y="200" width="20" height="20" rx="3"/>
    <rect x="300" y="200" width="20" height="20" rx="3"/>
    <rect x="330" y="200" width="80" height="20" rx="3"/>
  </g>
  
  <!-- Наушники -->
  <path d="M450 180 C450 150, 500 130, 550 150 C550 150, 550 200, 550 200 C550 200, 530 210, 530 180 C530 180, 530 160, 530 160" 
        fill="none" stroke="#ddd" stroke-width="8" stroke-linecap="round"/>
  <path d="M550 180 C550 150, 500 130, 450 150 C450 150, 450 200, 450 200 C450 200, 470 210, 470 180 C470 180, 470 160, 470 160" 
        fill="none" stroke="#ddd" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="450" cy="190" rx="20" ry="25" fill="#333" stroke="#444" stroke-width="2"/>
  <ellipse cx="550" cy="190" rx="20" ry="25" fill="#333" stroke="#444" stroke-width="2"/>
  
  <!-- Мышь -->
  <ellipse cx="500" cy="270" rx="25" ry="40" fill="#333" stroke="#444" stroke-width="2"/>
  <line x1="500" y1="250" x2="500" y2="270" stroke="#444" stroke-width="2"/>
  <ellipse cx="500" cy="240" rx="10" ry="5" fill="#222"/>

  <!-- Светящиеся элементы -->
  <rect x="120" y="170" width="20" height="20" rx="3" fill="#00bfff" opacity="0.7"/>
  <rect x="150" y="170" width="20" height="20" rx="3" fill="#00bfff" opacity="0.7"/>
  <ellipse cx="500" cy="240" rx="10" ry="5" fill="#00bfff" opacity="0.7"/>
  <ellipse cx="450" cy="190" rx="15" ry="20" fill="#00bfff" opacity="0.3"/>
  <ellipse cx="550" cy="190" rx="15" ry="20" fill="#00bfff" opacity="0.3"/>
</svg> 