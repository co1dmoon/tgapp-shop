version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: tg-shop-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tg-shop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js + Telegram Bot)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-shop-backend
    restart: always
    env_file:
      - .env
    environment:
      # Переопределяем настройки для Docker
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WEBAPP_URL: http://localhost:3000
      USE_NGROK: "false"
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./photos:/app/photos
    networks:
      - tg-shop-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tg-shop-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - tg-shop-network

networks:
  tg-shop-network:
    driver: bridge

volumes:
  pgdata: