version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tgapp-shop-db-dev
    environment:
      POSTGRES_DB: tg-shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - tgapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg-shop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
    driver: local

networks:
  tgapp-network:
    driver: bridge 