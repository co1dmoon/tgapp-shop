version: '3.8'

services:
  # Основное приложение (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgapp-shop
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=https://${SERVER_DOMAIN}
      - VK_S3_ACCESS_KEY_ID=${VK_S3_ACCESS_KEY_ID}
      - VK_S3_SECRET_ACCESS_KEY=${VK_S3_SECRET_ACCESS_KEY}
      - VK_S3_BUCKET_NAME=${VK_S3_BUCKET_NAME}
      - VK_S3_ENDPOINT=${VK_S3_ENDPOINT}
      - VK_S3_REGION=${VK_S3_REGION}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
    volumes:
      - app_data:/app/data
    networks:
      - app-network
    depends_on:
      - db
    
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: tgapp-shop-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "5432:5432"

  # Nginx прокси для HTTPS
  nginx:
    image: nginx:alpine
    container_name: tgapp-shop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - app

  # Certbot для Let's Encrypt (когда будет домен)
  # certbot:
  #   image: certbot/certbot
  #   container_name: tgapp-shop-certbot
  #   volumes:
  #     - ./nginx/ssl:/etc/letsencrypt
  #     - ./nginx/www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  app_data:

networks:
  app-network:
    driver: bridge 