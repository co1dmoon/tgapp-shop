services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgapp-shop
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=https://${SERVER_DOMAIN}
      - VK_S3_ACCESS_KEY_ID=${VK_S3_ACCESS_KEY_ID}
      - VK_S3_SECRET_ACCESS_KEY=${VK_S3_SECRET_ACCESS_KEY}
      - VK_S3_BUCKET_NAME=${VK_S3_BUCKET_NAME}
      - VK_S3_ENDPOINT=${VK_S3_ENDPOINT:-https://hb.bizmrg.com}
      - VK_S3_REGION=${VK_S3_REGION:-ru-msk}
      - ADMIN_IDS=${ADMIN_IDS}
    volumes:
      - app_data:/app/data
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: tgapp-shop-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: tgapp-shop-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SERVER_DOMAIN: ${SERVER_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network
    depends_on:
      - app

volumes:
  postgres_data:
  app_data:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
